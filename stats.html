<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Статистика 🐾</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f1a;
  --card: #1a1a2e;
  --accent: #ff6b9d;
  --accent2: #c44dff;
  --accent-glow: rgba(255, 107, 157, 0.3);
  --text: #f0f0f0;
  --text2: #a0a0b8;
  --success: #4ecdc4;
  --radius: 16px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 16px;
  padding-bottom: 40px;
}
.container { max-width: 420px; margin: 0 auto; }

/* Lock screen */
.lock-screen {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  text-align: center;
  padding: 40px;
}
.lock-screen.show { display: flex; }
.lock-icon { font-size: 64px; margin-bottom: 20px; }
.lock-title { font-size: 22px; font-weight: 800; margin-bottom: 12px; }
.lock-text { font-size: 14px; color: var(--text2); margin-bottom: 24px; }
.lock-link {
  display: inline-block;
  padding: 14px 28px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
  border-radius: 12px;
  font-weight: 800;
  text-decoration: none;
}

/* Header */
.header {
  text-align: center;
  padding: 16px 0 24px;
}
.header .logo { font-size: 40px; }
.header h1 {
  font-size: 22px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-top: 4px;
}

/* Loading */
.loading {
  text-align: center;
  padding: 60px 0;
}
.spinner {
  width: 44px; height: 44px;
  border: 4px solid var(--card);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Counters */
.counters {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}
.counter-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px 16px;
  text-align: center;
}
.counter-value {
  font-size: 36px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.counter-label {
  font-size: 13px;
  font-weight: 700;
  color: var(--text2);
  margin-top: 4px;
}

/* Section */
.section {
  margin-bottom: 24px;
  animation: fadeIn 0.4s ease both;
}
.section-title {
  font-size: 16px;
  font-weight: 800;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* Top list */
.top-list {
  background: var(--card);
  border-radius: var(--radius);
  overflow: hidden;
}
.top-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.top-item:last-child { border-bottom: none; }
.top-rank {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 800;
  flex-shrink: 0;
}
.top-rank.gold { background: #ffd700; color: #1a1a2e; }
.top-rank.silver { background: #c0c0c0; color: #1a1a2e; }
.top-rank.bronze { background: #cd7f32; color: #fff; }
.top-name {
  flex: 1;
  font-weight: 700;
  font-size: 15px;
}
.top-count {
  font-weight: 800;
  color: var(--accent);
  font-size: 15px;
}

/* Progress bar */
.bar-container {
  background: var(--card);
  border-radius: var(--radius);
  overflow: hidden;
}
.bar-item {
  padding: 12px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.bar-item:last-child { border-bottom: none; }
.bar-label {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
}
.bar-name { font-weight: 700; font-size: 14px; }
.bar-value { font-weight: 800; color: var(--accent); font-size: 14px; }
.bar-track {
  height: 8px;
  background: var(--bg);
  border-radius: 4px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width 0.8s ease;
}

/* Achievements */
.achievements-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.achievement {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px 12px;
  text-align: center;
  opacity: 0.35;
  transition: all 0.3s ease;
}
.achievement.unlocked {
  opacity: 1;
  border: 2px solid var(--accent);
  box-shadow: 0 0 12px var(--accent-glow);
}
.achievement-icon { font-size: 28px; margin-bottom: 4px; }
.achievement-title { font-size: 13px; font-weight: 800; }
.achievement-desc { font-size: 11px; color: var(--text2); margin-top: 2px; }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 24px;
  color: var(--text2);
  font-size: 14px;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="lock-screen" id="lockScreen">
  <div class="lock-icon">🔒</div>
  <div class="lock-title">Откройте через Telegram</div>
  <div class="lock-text">Кусьбот работает только внутри Telegram.</div>
  <a class="lock-link" href="https://t.me/KycbkaBot">Открыть бота 🐾</a>
</div>

<div class="container">
  <div class="header">
    <div class="logo">📊</div>
    <h1>Кусь-статистика</h1>
  </div>

  <div class="loading" id="loadingState">
    <div class="spinner"></div>
    <div style="color:var(--text2); font-weight:700">Загружаем...</div>
  </div>

  <div id="statsContent" style="display:none">
    <!-- Счётчики -->
    <div class="counters">
      <div class="counter-card">
        <div class="counter-value" id="sentCount">0</div>
        <div class="counter-label">Куснул(-а)</div>
      </div>
      <div class="counter-card">
        <div class="counter-value" id="recvCount">0</div>
        <div class="counter-label">Куснули тебя</div>
      </div>
    </div>

    <!-- Топ частей тела -->
    <div class="section" id="topPartsSection" style="animation-delay: 0.1s">
      <div class="section-title">🏆 Топ кусаемых мест</div>
      <div class="bar-container" id="topParts"></div>
    </div>

    <!-- Кого кусал -->
    <div class="section" id="topRecipientsSection" style="animation-delay: 0.2s">
      <div class="section-title">👥 Кого кусал(-а) больше всего</div>
      <div class="top-list" id="topRecipients"></div>
    </div>

    <!-- Кто кусал -->
    <div class="section" id="topSendersSection" style="animation-delay: 0.3s">
      <div class="section-title">👥 Кто тебя кусал больше всего</div>
      <div class="top-list" id="topSenders"></div>
    </div>

    <!-- Достижения -->
    <div class="section" style="animation-delay: 0.4s">
      <div class="section-title">🏅 Достижения</div>
      <div class="achievements-grid" id="achievements"></div>
    </div>
  </div>
</div>

<script>
const API = 'https://bite-bot.lisofoxa.workers.dev';
const tg = window.Telegram?.WebApp;

const ALL_ACHIEVEMENTS = [
  { count: 1, icon: '🐣', title: 'Первый кусь' },
  { count: 10, icon: '🐾', title: 'Кусака' },
  { count: 25, icon: '🦷', title: 'Зубастик' },
  { count: 50, icon: '😈', title: 'Кусь-маньяк' },
  { count: 100, icon: '👑', title: 'Кусь-легенда' },
];

document.addEventListener('DOMContentLoaded', async () => {
  if (!tg || !tg.initDataUnsafe?.user) {
    document.getElementById('lockScreen').classList.add('show');
    return;
  }

  tg.ready();
  tg.expand();
  tg.setHeaderColor('#0f0f1a');
  tg.setBackgroundColor('#0f0f1a');

  const userId = tg.initDataUnsafe.user.id;

  try {
    const res = await fetch(`${API}/api/stats`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: userId })
    });
    const data = await res.json();

    if (!data.ok) throw new Error('Failed');

    renderStats(data.stats);
  } catch(e) {
    console.error(e);
    document.getElementById('loadingState').innerHTML = `
      <div style="font-size:48px;margin-bottom:12px">😿</div>
      <div style="color:var(--text2);font-weight:700">Не удалось загрузить статистику</div>
    `;
  }
});

function renderStats(stats) {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('statsContent').style.display = 'block';

  // Counters with count-up animation
  animateCount('sentCount', stats.sent);
  animateCount('recvCount', stats.received);

  // Top body parts (bar chart)
  const partsContainer = document.getElementById('topParts');
  if (stats.topBodyParts.length === 0) {
    partsContainer.innerHTML = '<div class="empty-state">Пока нет данных 🐾</div>';
  } else {
    const maxCount = stats.topBodyParts[0][1];
    partsContainer.innerHTML = stats.topBodyParts.map(([name, count]) => `
      <div class="bar-item">
        <div class="bar-label">
          <span class="bar-name">${getPartEmoji(name)} ${name}</span>
          <span class="bar-value">${count}</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width: ${(count / maxCount) * 100}%"></div>
        </div>
      </div>
    `).join('');
  }

  // Top recipients
  renderTopList('topRecipients', 'topRecipientsSection', stats.topRecipients);

  // Top senders
  renderTopList('topSenders', 'topSendersSection', stats.topSenders);

  // Achievements
  const achContainer = document.getElementById('achievements');
  achContainer.innerHTML = ALL_ACHIEVEMENTS.map(a => {
    const unlocked = stats.sent >= a.count;
    return `
      <div class="achievement ${unlocked ? 'unlocked' : ''}">
        <div class="achievement-icon">${a.icon}</div>
        <div class="achievement-title">${a.title}</div>
        <div class="achievement-desc">${a.count} кусей</div>
      </div>
    `;
  }).join('');
}

function renderTopList(containerId, sectionId, data) {
  const container = document.getElementById(containerId);
  if (data.length === 0) {
    container.innerHTML = '<div class="empty-state">Пока нет данных 🐾</div>';
    return;
  }

  const rankClasses = ['gold', 'silver', 'bronze'];
  container.innerHTML = data.map(([name, count], i) => `
    <div class="top-item">
      <div class="top-rank ${rankClasses[i] || ''}">${i + 1}</div>
      <div class="top-name">${escHtml(name)}</div>
      <div class="top-count">${count}×</div>
    </div>
  `).join('');
}

function animateCount(id, target) {
  const el = document.getElementById(id);
  if (target === 0) { el.textContent = '0'; return; }

  let current = 0;
  const step = Math.max(1, Math.floor(target / 30));
  const interval = setInterval(() => {
    current += step;
    if (current >= target) {
      current = target;
      clearInterval(interval);
    }
    el.textContent = current;
  }, 30);
}

function getPartEmoji(part) {
  const map = {
    'щёчка': '😊', 'ушко': '👂', 'носик': '👃', 'лобик': '🧠',
    'пальчик': '👆', 'плечико': '💪', 'ручка': '🤚', 'коленка': '🦵',
    'пяточка': '🦶', 'шейка': '🌙', 'губки': '💋', 'пузико': '😏',
    'бочок': '🤗', 'попка': '🍑', 'ключица': '✨', 'мочка уха': '👂'
  };
  return map[part] || '🐾';
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
